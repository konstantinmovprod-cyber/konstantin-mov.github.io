name: Deploy site + Pravda Mini App to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; don't cancel a run in progress.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pravda-mini-app/package-lock.json

      - name: Install deps
        working-directory: pravda-mini-app
        run: npm ci

      - name: Build Mini App
        working-directory: pravda-mini-app
        run: npm run build

      - name: Assemble Pages site
        run: |
          mkdir -p _site
          # Keep the existing root site (landing page, README, etc.)
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='pravda-mini-app' \
            --exclude='_site' \
            ./ _site/
          # Publish the built Mini App under /pravda-mini-app/
          mkdir -p _site/pravda-mini-app
          cp -r pravda-mini-app/dist/. _site/pravda-mini-app/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
